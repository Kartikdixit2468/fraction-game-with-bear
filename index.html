<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraction Bears Math Game</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        10%,
        30%,
        50%,
        70%,
        90% {
          transform: translateX(-5px);
        }
        20%,
        40%,
        60%,
        80% {
          transform: translateX(5px);
        }
      }
      .animate-shake {
        animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }
      @keyframes pop {
        0% {
          transform: scale(0.8);
          opacity: 0;
        }
        50% {
          transform: scale(1.1);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .animate-pop {
        animation: pop 0.3s ease-out forwards;
      }
      @keyframes floatUp {
        0% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translateY(-100px) scale(0);
          opacity: 0;
        }
      }
      .confetti-piece {
        position: absolute;
        animation: floatUp 1.5s ease-out forwards;
        pointer-events: none;
        z-index: 50;
      }
      /* Removing number input arrows */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      /* Custom shadow for the 3D pie chart look */
      .pie-shadow {
        box-shadow:
          inset 0 8px 10px rgba(0, 0, 0, 0.1),
          0 10px 20px rgba(0, 0, 0, 0.15);
      }
      .pie-initial-bg {
        background: conic-gradient(#e5e7eb 0% 100%);
      }
    </style>
  </head>
  <body
    class="h-screen bg-green-50 flex flex-col font-sans select-none overflow-hidden"
  >
    <!-- Confetti Container -->
    <div
      id="confetti-container"
      class="fixed inset-0 pointer-events-none overflow-hidden z-50"
    ></div>

    <!-- Header -->
    <div
      class="w-full bg-green-900 text-white p-3 shadow-md flex justify-between items-center z-10 shrink-0"
    >
      <h1 class="text-xl md:text-2xl font-bold tracking-wider">
        🐻 Forest Fractions
      </h1>
      <button
        onclick="initGame()"
        class="bg-green-700 hover:bg-green-600 px-3 py-1.5 rounded-full font-bold text-sm md:text-base transition-transform active:scale-95 flex items-center gap-1.5 cursor-pointer"
      >
        <span>↺</span> Restart
      </button>
    </div>

    <!-- Main Layout -->
    <div
      class="flex-1 w-full max-w-6xl mx-auto flex flex-col gap-2 lg:gap-3 px-2.5 md:px-4 py-2 md:py-3 overflow-visible"
    >
      <!-- Top Split: Left Pie / Right Bears -->
      <div
        class="flex-1 min-h-0 w-full flex flex-col lg:flex-row gap-2 lg:gap-3"
      >
        <!-- LEFT SIDE: Pie Chart (no container card) -->
        <div
          id="pie-panel"
          class="w-full lg:w-[320px] xl:w-[350px] shrink-0 flex flex-col items-center justify-center gap-3 py-0.5"
        >
          <div
            class="w-[92%] flex items-center justify-center gap-3 text-xs sm:text-sm font-semibold"
          >
            <span id="chart-mode-pie-label" class="text-green-900">Pie</span>
            <button
              id="chart-mode-toggle"
              onclick="toggleChartMode()"
              class="relative w-14 h-8 rounded-full bg-slate-300 transition-colors duration-300"
              aria-label="Toggle chart representation"
            >
              <span
                id="chart-mode-thumb"
                class="absolute top-1 left-1 w-6 h-6 rounded-full bg-white shadow-md transition-transform duration-300"
              ></span>
            </button>
            <span id="chart-mode-rect-label" class="text-green-500"
              >Rectangle</span
            >
          </div>

          <div id="pie-chart-wrap" class="relative">
            <div
              id="pie-chart"
              class="w-48 h-48 sm:w-56 sm:h-56 md:w-[14rem] md:h-[14rem] rounded-full border-[6px] border-white pie-shadow pie-initial-bg transition-all duration-700 ease-out"
            ></div>
            <div
              class="absolute inset-0 m-auto w-14 h-14 sm:w-16 sm:h-16 bg-white rounded-full pie-shadow flex items-center justify-center"
            >
              <span class="text-xl sm:text-2xl">🐻</span>
            </div>
          </div>

          <div id="rect-chart-wrap" class="hidden w-56 sm:w-64 md:w-[16rem]">
            <div
              id="rect-chart"
              class="h-8 sm:h-9 md:h-10 rounded-full border-[3px] border-white pie-shadow bg-gray-200 overflow-hidden flex"
            >
              <div
                id="rect-seg-green"
                class="h-full w-0 bg-green-400 transition-all duration-700 ease-out"
              ></div>
              <div
                id="rect-seg-yellow"
                class="h-full w-0 bg-yellow-300 transition-all duration-700 ease-out"
              ></div>
              <div
                id="rect-seg-gray"
                class="h-full w-full bg-gray-300 transition-all duration-700 ease-out"
              ></div>
            </div>
          </div>

          <div
            id="pie-indicators"
            class="w-[92%] flex flex-col gap-1.5 text-xs sm:text-sm font-semibold text-green-900"
          >
            <div
              class="flex items-center gap-2 bg-yellow-50/90 border border-yellow-200 rounded-lg px-3 py-1"
            >
              <span
                class="w-3 h-3 rounded-full bg-yellow-400 border border-yellow-500 shrink-0"
              ></span>
              <span>Yellow = Bears With Honey</span>
            </div>
            <div
              class="flex items-center gap-2 bg-green-50/90 border border-green-200 rounded-lg px-3 py-1"
            >
              <span
                class="w-3 h-3 rounded-full bg-green-400 border border-green-500 shrink-0"
              ></span>
              <span>Green = Bears That Ate Honey</span>
            </div>
          </div>

        </div>

        <!-- RIGHT SIDE: Game Board (no container card) -->
        <div
          id="game-board-container"
          class="flex-1 min-h-0 min-w-0 flex flex-col items-center justify-center p-1 sm:p-2 md:p-3 overflow-visible"
        >
          <div
            id="game-board"
            class="flex flex-col gap-1.5 md:gap-2.5 lg:gap-3 w-full items-center"
          >
            <!-- Bears will be injected here -->
          </div>
        </div>
      </div>

      <!-- Bottom Instruction & Action Panel -->
      <div
        id="control-panel"
        class="w-[60%] md:w-[75%] max-w-5xl mx-auto bg-white rounded-2xl p-2.5 md:p-3 shadow-xl border-4 border-green-200 flex flex-col gap-2 transition-colors shrink-0"
      >
        <div class="w-full flex flex-col md:flex-row items-center gap-2 md:gap-3 justify-between">
          <div
            class="flex-1 flex items-center gap-2 md:gap-2.5 text-xs sm:text-sm md:text-base text-green-900 font-medium w-full"
          >
            <div
              id="icon-container"
              class="bg-yellow-100 p-1.5 rounded-full shrink-0 text-base"
            >
              📝
            </div>
            <div
              id="instruction-text"
              class="flex-1 flex items-center flex-wrap leading-snug"
            >
              <!-- Instructions injected here -->
            </div>
          </div>

          <button
            id="action-btn"
            onclick="handleAction()"
            class="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 px-4 sm:px-5 py-2 rounded-xl font-bold text-sm sm:text-base shadow-[0_4px_0_#ca8a04] active:shadow-[0_0px_0_#ca8a04] active:translate-y-[4px] transition-all cursor-pointer whitespace-nowrap"
          >
            DONE
          </button>
        </div>

        <div
          id="final-equation"
          class="w-full flex flex-col gap-1 bg-green-100 border-2 border-green-300 p-2 md:p-2.5 rounded-xl"
        >
          <span class="text-green-800 text-xs sm:text-sm font-bold"
            >Fraction Multiplication!</span
          >
          <div
            id="equation-content"
            class="flex items-center gap-1 md:gap-2 bg-white px-2.5 md:px-3 py-1.5 rounded-lg shadow-sm w-full overflow-x-auto"
          >
            <!-- Equation injected here -->
          </div>
        </div>
      </div>
    </div>

    <script>
      // --- Game State ---
      let gameState = 0; // 0: STAGE_1, 1: STAGE_2, 2: STAGE_3, 3: COMPLETED
      let cols = 6;
      const rows = 4;
      let totalBears = rows * cols;
      let bears = [];
      let f1 = { n: 1, d: 2 };
      let f2 = { n: 1, d: 2 };
      let targetH = 0;
      let finalNum = 0;
      let finalDen = 0;
      let chartMode = "pie";
      let currentVisualMetrics = { bearSize: 56, honeySize: 24, sparkleSize: 20 };

      // --- Math Helpers ---
      const gcd = (a, b) => (b === 0 ? a : gcd(b, a % b));

      const getValidFraction = (total, minTarget) => {
        let options = [];
        for (let d = 2; d <= total; d++) {
          if (total % d === 0) {
            for (let n = 1; n < d; n++) {
              let target = (total * n) / d;
              if (target >= minTarget) {
                options.push({ n, d, target });
              }
            }
          }
        }
        if (options.length === 0) return { n: 1, d: total, target: 1 };
        let picked = options[Math.floor(Math.random() * options.length)];
        const divisor = gcd(picked.n, picked.d);
        return { n: picked.n / divisor, d: picked.d / divisor };
      };

      // --- UI Formatters ---
      const formatFraction = (n, d) => `
          <span class="inline-flex flex-col items-center justify-center align-middle mx-1 text-sm sm:text-base font-bold text-green-900">
            <span class="border-b-[2px] border-green-900 leading-none px-1 pb-[1px]">${n}</span>
            <span class="leading-none px-1 pt-[2px]">${d}</span>
          </span>
      `;

      function getBearHtml(bear, metrics, animateEffects = false) {
        const effectClass = animateEffects ? " animate-pop" : "";

        let html = `<div class="filter drop-shadow-md z-10 relative leading-none" style="font-size:${metrics.bearSize}px;">🐻</div>`;

        if (bear.state >= 1) {
          html += `<div class="absolute -bottom-1 -right-1 z-20${effectClass}" style="font-size:${metrics.honeySize}px;">🍯</div>`;
        }
        if (bear.state === 2) {
          html += `<div class="absolute -top-3 left-1/2 -translate-x-1/2 z-30${effectClass}" style="font-size:${metrics.sparkleSize}px;">✨</div>`;
        }

        return html;
      }

      function setChartMode(mode) {
        chartMode = mode === "rect" ? "rect" : "pie";

        const pieWrap = document.getElementById("pie-chart-wrap");
        const rectWrap = document.getElementById("rect-chart-wrap");
        const toggle = document.getElementById("chart-mode-toggle");
        const thumb = document.getElementById("chart-mode-thumb");
        const pieLabel = document.getElementById("chart-mode-pie-label");
        const rectLabel = document.getElementById("chart-mode-rect-label");

        const rectActive = chartMode === "rect";

        pieWrap.classList.toggle("hidden", rectActive);
        rectWrap.classList.toggle("hidden", !rectActive);

        toggle.classList.toggle("bg-slate-300", !rectActive);
        toggle.classList.toggle("bg-green-600", rectActive);
        thumb.style.transform = rectActive ? "translateX(24px)" : "translateX(0px)";

        pieLabel.classList.toggle("text-green-900", !rectActive);
        pieLabel.classList.toggle("text-green-500", rectActive);
        rectLabel.classList.toggle("text-green-900", rectActive);
        rectLabel.classList.toggle("text-green-500", !rectActive);
      }

      function toggleChartMode() {
        setChartMode(chartMode === "pie" ? "rect" : "pie");
      }

      function updateBearVisual(index, animateEffects = true) {
        const bearDiv = document.querySelector(`[data-bear-id="${index}"]`);
        if (!bearDiv) {
          renderBears();
          return;
        }
        bearDiv.innerHTML = getBearHtml(bears[index], currentVisualMetrics, animateEffects);
      }

      function updateEquationDisplay(showResult = false) {
        const eqContent = document.getElementById("equation-content");
        if (!eqContent) return;

        if (!showResult) {
          eqContent.innerHTML = `
            ${formatFraction(f1.n, f1.d)}
            <span class="text-green-800 font-black text-base md:text-lg">×</span>
            ${formatFraction(f2.n, f2.d)}
            <span class="text-green-800 font-black text-base md:text-lg">=</span>
            <span class="text-green-700 font-bold text-base md:text-lg px-1">?</span>
          `;
          return;
        }

        const divisor = gcd(finalNum, finalDen);
        let eqHtml = `
          ${formatFraction(f1.n, f1.d)}
          <span class="text-green-800 font-black text-base md:text-lg">×</span>
          ${formatFraction(f2.n, f2.d)}
          <span class="text-green-800 font-black text-base md:text-lg">=</span>
          ${formatFraction(finalNum, finalDen)}
        `;

        if (divisor > 1) {
          const simpNum = finalNum / divisor;
          const simpDen = finalDen / divisor;
          eqHtml += `
            <span class="text-green-700 font-semibold text-sm md:text-base mx-1 sm:mx-2 whitespace-nowrap">which is same as</span>
            ${formatFraction(simpNum, simpDen)}
          `;
        }

        eqContent.innerHTML = eqHtml;
      }

      // --- Core Game Logic ---
      function initGame() {
        cols = Math.floor(Math.random() * 4) + 4; // 4 to 7 columns; renderBears auto-fits size
        totalBears = rows * cols;

        f1 = getValidFraction(totalBears, 4);
        targetH = (totalBears * f1.n) / f1.d;
        f2 = getValidFraction(targetH, 1);

        bears = Array.from({ length: totalBears }, (_, i) => ({
          id: i,
          row: Math.floor(i / cols),
          state: 0,
        }));

        gameState = 0;
        setChartMode(chartMode);
        updateUI();
        renderBears();
        updateChart(); // Initial chart render
      }

      function handleBearClick(index) {
        if (gameState === 3) return;

        const bear = bears[index];
        let didUpdate = false;

        if (gameState === 0) {
          bear.state = bear.state === 0 ? 1 : 0;
          didUpdate = true;
        } else if (gameState === 1) {
          if (bear.state > 0) {
            bear.state = bear.state === 1 ? 2 : 1;
            didUpdate = true;
          }
        }

        if (didUpdate) {
          updateBearVisual(index, true);
          updateChart(); // Live update pie chart!
        }
      }

      function handleAction() {
        const panel = document.getElementById("control-panel");

        if (gameState === 0) {
          const currentH = bears.filter((b) => b.state >= 1).length;
          if (currentH === targetH) {
            triggerConfetti();
            gameState = 1;
            updateUI();
            renderBears();
          } else {
            triggerError();
          }
        } else if (gameState === 1) {
          const currentE = bears.filter((b) => b.state === 2).length;
          const targetE = (targetH * f2.n) / f2.d;
          if (currentE === targetE) {
            triggerConfetti();
            gameState = 2;
            updateUI();
            renderBears();
          } else {
            triggerError();
          }
        } else if (gameState === 2) {
          const numInput = document.getElementById("user-num").value;
          const denInput = document.getElementById("user-den").value;
          const num = parseInt(numInput);
          const den = parseInt(denInput);
          const targetE = (targetH * f2.n) / f2.d;
          const targetRatio = targetE / totalBears;

          if (
            !isNaN(num) &&
            !isNaN(den) &&
            den !== 0 &&
            Math.abs(num / den - targetRatio) < 0.001
          ) {
            finalNum = num;
            finalDen = den;
            triggerConfetti();
            gameState = 3;
            updateUI();
            renderBears();
          } else {
            triggerError();
          }
        } else if (gameState === 3) {
          initGame();
        }
      }

      // --- Live Chart Logic ---
      function updateChart() {
        const pieChart = document.getElementById("pie-chart");
        const rectSegGreen = document.getElementById("rect-seg-green");
        const rectSegYellow = document.getElementById("rect-seg-yellow");
        const rectSegGray = document.getElementById("rect-seg-gray");

        const currentH = bears.filter((b) => b.state >= 1).length;
        const currentE = bears.filter((b) => b.state === 2).length;

        // Calculate percentages
        const pGreen = (currentE / totalBears) * 100;
        const pYellow = (currentH / totalBears) * 100;

        pieChart.style.background = `conic-gradient(
            #4ade80 0% ${pGreen}%, 
            #fde047 ${pGreen}% ${pYellow}%, 
            #e5e7eb ${pYellow}% 100%
        )`;

        const yellowOnly = Math.max(0, pYellow - pGreen);
        const grayPart = Math.max(0, 100 - pYellow);

        rectSegGreen.style.width = `${pGreen}%`;
        rectSegYellow.style.width = `${yellowOnly}%`;
        rectSegGray.style.width = `${grayPart}%`;
      }

      // --- Rendering & Effects ---
      function renderBears() {
        const board = document.getElementById("game-board");
        const boardContainer = document.getElementById("game-board-container");
        board.innerHTML = "";

        const boardHeight = Math.max(280, Math.floor(boardContainer.clientHeight));
        const rowGap = Math.max(5, Math.min(10, Math.floor(boardHeight * 0.02)));
        board.style.gap = `${rowGap}px`;

        const boardWidth = Math.max(
          340,
          Math.floor(boardContainer.clientWidth),
        );
        const sidePadding = Math.max(10, Math.floor(boardWidth * 0.03));
        const usableWidth = Math.max(280, boardWidth - sidePadding * 2);
        const gapSize = Math.max(
          3,
          Math.min(9, Math.floor(usableWidth * 0.009)),
        );
        const baseByWidth = Math.floor((usableWidth - gapSize * (cols - 1)) / cols);
        const baseByHeight = Math.floor((boardHeight - rowGap * (rows - 1)) / rows);
        const baseBearSize = Math.min(baseByWidth, Math.floor(baseByHeight * 0.92));
        const bearSize = Math.max(
          34,
          Math.min(60, Math.floor(baseBearSize * 0.9)),
        );
        const honeySize = Math.max(18, Math.floor(bearSize * 0.48));
        const sparkleSize = Math.max(16, Math.floor(bearSize * 0.34));
        currentVisualMetrics = { bearSize, honeySize, sparkleSize };
        const platformHeight = Math.max(
          24,
          Math.min(34, Math.floor(bearSize * 0.34)),
        );
        const platformBorder = Math.max(4, Math.floor(platformHeight * 0.16));
        const bearLift = Math.max(5, Math.floor(bearSize * 0.12));

        for (let r = 0; r < rows; r++) {
          const rowBears = bears.filter((b) => b.row === r);
          const rowWrapper = document.createElement("div");
          rowWrapper.className =
            "relative flex justify-center group w-full box-border";
          rowWrapper.style.paddingLeft = `${sidePadding}px`;
          rowWrapper.style.paddingRight = `${sidePadding}px`;

          // Platform
          const platform = document.createElement("div");
          const rowSpan =
            rowBears.length * bearSize +
            Math.max(0, rowBears.length - 1) * gapSize;
          const platformExtra = Math.max(80, Math.floor(bearSize * 1.75));
          const platformWidth = Math.min(
            boardWidth - Math.floor(sidePadding * 0.15),
            rowSpan + platformExtra,
          );

          platform.className =
            "absolute bottom-0 bg-green-800 rounded-full border-green-950 shadow-xl -z-10 group-hover:bg-green-700 transition-colors";
          platform.style.height = `${platformHeight}px`;
          platform.style.borderBottomWidth = `${platformBorder}px`;
          platform.style.filter = "drop-shadow(0 10px 10px rgba(0,0,0,0.35))";
          platform.style.width = `${platformWidth}px`;
          platform.style.left = "50%";
          platform.style.transform = "translateX(-50%)";
          rowWrapper.appendChild(platform);

          // Bears container
          const bearsContainer = document.createElement("div");
          bearsContainer.className =
            "flex justify-center px-1.5 items-end relative";
          bearsContainer.style.gap = `${gapSize}px`;
          bearsContainer.style.paddingBottom = `${bearLift}px`;

          rowBears.forEach((bear) => {
            const bearDiv = document.createElement("div");
            const inactiveDuringStep2 = gameState === 1 && bear.state === 0;
            const inactiveDuringStep3 = gameState === 2 && bear.state === 1;
            const canInteract = gameState === 0 || (gameState === 1 && bear.state > 0);

            bearDiv.className = `relative transition-all duration-200 ${canInteract ? "hover:-translate-y-2 cursor-pointer active:scale-90" : "cursor-default"}`;
            bearDiv.style.opacity = inactiveDuringStep2 || inactiveDuringStep3 ? "0.5" : "1";

            if (canInteract) {
              bearDiv.onclick = () => handleBearClick(bear.id);
            }

            bearDiv.dataset.bearId = bear.id.toString();
            bearDiv.innerHTML = getBearHtml(bear, currentVisualMetrics, false);
            bearsContainer.appendChild(bearDiv);
          });

          rowWrapper.appendChild(bearsContainer);
          board.appendChild(rowWrapper);
        }
      }

      window.addEventListener("resize", () => {
        if (bears.length > 0) {
          renderBears();
        }
      });

      function updateUI() {
        const iconContainer = document.getElementById("icon-container");
        const instructionText = document.getElementById("instruction-text");
        const actionBtn = document.getElementById("action-btn");

        if (gameState === 0) {
          iconContainer.innerHTML = "📝";
          instructionText.innerHTML = `Give honeypots to ${formatFraction(f1.n, f1.d)} of the <strong>${totalBears}</strong>   bears by clicking them.`;
          updateEquationDisplay(false);
          actionBtn.innerHTML = "DONE";
          setupActionButtonClasses(false);
        } else if (gameState === 1) {
          instructionText.innerHTML = `Now, make ${formatFraction(f2.n, f2.d)} of the <strong>${targetH}</strong> bears with honeypots eat their honey.`;
          updateEquationDisplay(false);
        } else if (gameState === 2) {
          instructionText.innerHTML = `
            What fraction of all <strong>${totalBears}</strong> bears have eaten honey? 
            <div class="inline-flex flex-col items-center align-middle mx-2 gap-1 bg-green-50 p-1 rounded-lg border-2 border-green-200 mt-1 sm:mt-0">
              <input type="number" id="user-num" class="w-11 h-7 text-center font-bold text-sm border-2 border-green-300 rounded focus:outline-none focus:border-green-600 bg-white">
              <div class="w-11 h-[3px] bg-green-800 rounded-full"></div>
              <input type="number" id="user-den" class="w-11 h-7 text-center font-bold text-sm border-2 border-green-300 rounded focus:outline-none focus:border-green-600 bg-white">
            </div>
          `;
          updateEquationDisplay(false);
        } else if (gameState === 3) {
          iconContainer.innerHTML = "🎉";
          instructionText.innerHTML = `<span class="text-green-700 font-bold">Amazing job! You solved it correctly! 🌟</span>`;
          updateEquationDisplay(true);

          actionBtn.innerHTML = "PLAY AGAIN";
          setupActionButtonClasses(true);
        }
      }

      function setupActionButtonClasses(isCompleted) {
        const btn = document.getElementById("action-btn");
        if (isCompleted) {
          btn.className =
            "bg-green-500 hover:bg-green-400 text-white px-4 sm:px-5 py-2 rounded-xl font-bold text-sm sm:text-base shadow-[0_4px_0_#166534] active:shadow-[0_0px_0_#166534] active:translate-y-[4px] transition-all animate-bounce cursor-pointer whitespace-nowrap";
        } else {
          btn.className =
            "bg-yellow-400 hover:bg-yellow-300 text-yellow-900 px-4 sm:px-5 py-2 rounded-xl font-bold text-sm sm:text-base shadow-[0_4px_0_#ca8a04] active:shadow-[0_0px_0_#ca8a04] active:translate-y-[4px] transition-all cursor-pointer whitespace-nowrap";
        }
      }

      function triggerError() {
        const panel = document.getElementById("control-panel");
        panel.classList.add("animate-shake", "border-red-400");
        panel.classList.remove("border-green-200");
        setTimeout(() => {
          panel.classList.remove("animate-shake", "border-red-400");
          panel.classList.add("border-green-200");
        }, 600);
      }

      function triggerConfetti() {
        const container = document.getElementById("confetti-container");
        const colors = ["#fde047", "#4ade80", "#60a5fa", "#f472b6", "#a78bfa"];
        const x = window.innerWidth / 2;
        const y = window.innerHeight / 2;

        for (let i = 0; i < 40; i++) {
          const confetti = document.createElement("div");
          confetti.className = "confetti-piece text-2xl md:text-3xl";
          confetti.innerHTML = "✨";
          const startX =
            x + (Math.random() * window.innerWidth - window.innerWidth / 2);
          confetti.style.left = startX + "px";
          confetti.style.top = y + Math.random() * 100 + "px";
          confetti.style.color =
            colors[Math.floor(Math.random() * colors.length)];
          container.appendChild(confetti);
          setTimeout(() => {
            if (container.contains(confetti)) container.removeChild(confetti);
          }, 1500);
        }
      }

      // Start game on load
      window.onload = initGame;
    </script>
  </body>
</html>
